<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Crosshair Catalogue</title>
    <meta name="description"
        content="Browse, preview, and copy popular Valorant crosshairs used by professionals and top players.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="toast" class="toast hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>Crosshair code copied!</span>
    </div>

    <header>
        <div class="header-content">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M99.25 48.66V10H60.59L99.25 48.66Z" fill="#FF4655" />
                    <path d="M58.32 10H0.75V48.66L28.18 76.09L58.32 45.95V10Z" fill="#FF4655" />
                </svg>
                <h1>Valorant <span>Crosshairs</span></h1>
            </div>
            <p>Browse, preview, and copy top pro crosshairs instantly.</p>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by player or team...">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>
    </header>

    <main>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="streamer">Streamers</button>
            <button class="filter-btn" data-filter="pro">Pro Players</button>
            <button class="filter-btn" data-filter="fun">Fun/Custom</button>
            <button class="filter-btn bg-toggle-btn" id="bgToggle" title="Toggle Background">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>

        <div id="teamPills" class="team-pills hidden"></div>

        <div id="crosshairGrid" class="crosshair-grid">
            <!-- Cards will be injected here via JS -->
            <div class="loading-state">Loading popular crosshairs...</div>
        </div>
    </main>

    <footer>
        <p>Built for the Valorant community. Crosshairs may look slightly different in-game based on resolution.</p>
    </footer>

    <!-- Template for crosshair cards -->
    <template id="cardTemplate">
        <div class="card">
            <div class="card-preview" title="Click for In-Game Preview">
                <!-- SVG Grid Background -->
                <div class="preview-bg"></div>
                <!-- Translucent Player Photo -->
                <img class="player-photo-bg" src="" alt="" />
                <!-- Canvas for drawing crosshair -->
                <canvas width="200" height="200"></canvas>
                <div class="preview-overlay">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path>
                    </svg>
                </div>
            </div>
            <div class="card-info">
                <div class="card-header">
                    <div class="player-identity">
                        <img class="player-avatar" src="" alt="" />
                        <h3 class="player-name">Player Name</h3>
                    </div>
                    <span class="team-badge">Team</span>
                </div>
                <div class="card-actions">
                    <button class="copy-btn" title="Copy Code">
                        <span>Copy Code</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Fullscreen In-Game Preview Modal -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <!-- Realistic In-Game Background (Empty environment with Vandal) -->
            <div class="range-bg">
                <img src="valo-bg-vandal-empty.png" alt="In-Game Background" class="bg-img" />
            </div>

            <!-- Interactive Target Dummy (Cypher) -->
            <div id="targetDummy" class="target-dummy-interactive cypher-dummy">
                <img src="cypher.png" alt="Cypher Target" class="cypher-img" />
            </div>

            <!-- Kill Banner UI (Hidden initially) -->
            <div id="killBanner" class="kill-banner">
                <div class="kill-icon">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M50 10C27.9086 10 10 27.9086 10 50C10 72.0914 27.9086 90 50 90C72.0914 90 90 72.0914 90 50C90 27.9086 72.0914 10 50 10Z"
                            fill="#ff4655" opacity="0.2" />
                        <path
                            d="M50 15C30.67 15 15 30.67 15 50C15 69.33 30.67 85 50 85C69.33 85 85 69.33 85 50C85 30.67 69.33 15 50 15Z"
                            stroke="#ff4655" stroke-width="2" />
                        <path d="M35 55L50 70L65 55" stroke="#ff4655" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M35 45L50 30L65 45" stroke="#ff4655" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="kill-text">ELIMINATED</div>
                <div class="kill-name" id="killName">DUMMY</div>
            </div>

            <!-- Bullet Tracers Container -->
            <div id="tracerContainer" class="tracer-container"></div>

            <!-- Muzzle Flash Overlay -->
            <div id="muzzleFlash" class="muzzle-flash hidden"></div>

            <button class="close-modal-btn" title="Close Preview">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <!-- Crosshair overlay -->
            <canvas id="modalCanvas" class="modal-canvas" width="800" height="800"></canvas>

            <!-- Bottom controls -->
            <div class="modal-controls">
                <div class="modal-player-info">
                    <h2 id="modalPlayerName">TenZ</h2>
                    <span id="modalPlayerTeam" class="team-badge">SEN</span>
                </div>

                <div class="modal-actions">
                    <button id="fireBtn" class="primary-btn pulse-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <circle cx="12" cy="12" r="4"></circle>
                            <line x1="21.17" y1="8" x2="12" y2="8"></line>
                            <line x1="3.95" y1="6.06" x2="8.54" y2="14"></line>
                            <line x1="10.88" y1="21.94" x2="15.46" y2="14"></line>
                        </svg>
                        Hold to Fire
                    </button>
                    <button id="modalCopyBtn" class="copy-btn">
                        <span>Copy Code</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="crosshair-parser.js"></script>
    <script src="crosshair-renderer.js"></script>
    <script src="app.js"></script>
</body>

</html>
